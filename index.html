<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Métricas Scrum - ITCA-FEPADE</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 700; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800">Dashboard de Métricas Ágiles</h1>
            <p class="text-slate-600">Simulador de Burndown y Burnup Chart para Equipos de Software</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- Panel de Control -->
            <div class="lg:col-span-1 card p-6 border-t-4 border-indigo-600 h-fit">
                <h2 class="text-lg font-bold mb-4 flex items-center text-slate-700">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                    Configuración
                </h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase">Story Points (Sprint Backlog)</label>
                        <input type="number" id="totalPoints" value="50" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:ring-indigo-500 focus:border-indigo-500 p-2 border">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase">Duración (Días hábiles)</label>
                        <input type="number" id="sprintDays" value="10" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:ring-indigo-500 focus:border-indigo-500 p-2 border">
                    </div>
                    <button onclick="initCharts()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded transition text-sm">
                        Reiniciar Sprint
                    </button>
                </div>

                <div class="mt-8 border-t pt-4">
                    <h3 class="font-bold text-slate-700 mb-3 text-sm">Registrar Progreso Diario</h3>
                    <div class="space-y-3">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase">Seleccionar Día</label>
                            <select id="daySelect" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm"></select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase">Puntos Terminados hoy</label>
                            <input type="number" id="pointsDone" placeholder="Ej: 5" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase">Nuevo Alcance (Opcional)</label>
                            <input type="number" id="newScope" placeholder="Total puntos actual" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm">
                            <p class="text-[10px] text-amber-600 mt-1 italic">Usa esto para simular Scope Creep.</p>
                        </div>
                    </div>
                    <button onclick="updateData()" class="mt-4 w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 px-4 rounded transition text-sm">
                        Actualizar Métricas
                    </button>
                </div>
            </div>

            <!-- Visualización de Gráficos -->
            <div class="lg:col-span-3 space-y-6">
                <div class="card p-4">
                    <!-- Pestañas -->
                    <div class="flex border-b mb-4">
                        <button id="tabBurndown" onclick="switchTab('burndown')" class="px-6 py-2 text-sm font-medium transition tab-active">Burndown Chart</button>
                        <button id="tabBurnup" onclick="switchTab('burnup')" class="px-6 py-2 text-sm font-medium transition text-gray-500 hover:text-indigo-600">Burnup Chart</button>
                    </div>

                    <div id="containerBurndown" class="relative h-[400px]">
                        <canvas id="burndownChart"></canvas>
                    </div>
                    <div id="containerBurnup" class="relative h-[400px] hidden">
                        <canvas id="burnupChart"></canvas>
                    </div>

                    <div id="statusMessage" class="mt-4 p-3 rounded-lg text-center font-medium hidden text-sm"></div>
                </div>

                <!-- Tabla Detallada -->
                <div class="card overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-slate-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-[10px] font-bold text-gray-500 uppercase">Día</th>
                                <th class="px-4 py-3 text-left text-[10px] font-bold text-gray-500 uppercase">Alcance Total</th>
                                <th class="px-4 py-3 text-left text-[10px] font-bold text-gray-500 uppercase">Completado Hoy</th>
                                <th class="px-4 py-3 text-left text-[10px] font-bold text-gray-500 uppercase">Acumulado</th>
                                <th class="px-4 py-3 text-left text-[10px] font-bold text-gray-500 uppercase">Restante</th>
                                <th class="px-4 py-3 text-left text-[10px] font-bold text-gray-500 uppercase">Estado</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody" class="bg-white divide-y divide-gray-100 text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let burndownChart, burnupChart;
        let sprint = {
            totalPoints: 0,
            days: 0,
            dailyScope: [],    // Total scope per day (for burnup line)
            dailyDone: [],     // Points done each day
            cumulativeDone: [], // Total points done up to day X
            pointsLeft: [],    // Remaining points per day
            idealBurndown: [],
            idealBurnup: []
        };

        function initCharts() {
            const total = parseInt(document.getElementById('totalPoints').value);
            const days = parseInt(document.getElementById('sprintDays').value);
            
            sprint.totalPoints = total;
            sprint.days = days;
            sprint.dailyScope = [total];
            sprint.dailyDone = [0];
            sprint.cumulativeDone = [0];
            sprint.pointsLeft = [total];
            sprint.idealBurndown = [];
            sprint.idealBurnup = [];

            const labels = [];
            for (let i = 0; i <= days; i++) {
                labels.push("Día " + i);
                sprint.idealBurndown.push((total - (i * (total / days))).toFixed(1));
                sprint.idealBurnup.push(((i * (total / days))).toFixed(1));
            }

            // Setup day selector
            const daySelect = document.getElementById('daySelect');
            daySelect.innerHTML = '';
            for (let i = 1; i <= days; i++) {
                const opt = document.createElement('option');
                opt.value = i; opt.innerHTML = "Día " + i;
                daySelect.appendChild(opt);
            }

            renderBurndown(labels);
            renderBurnup(labels);
            updateTable();
            document.getElementById('statusMessage').classList.add('hidden');
        }

        function renderBurndown(labels) {
            if (burndownChart) burndownChart.destroy();
            const ctx = document.getElementById('burndownChart').getContext('2d');
            burndownChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Ideal', data: sprint.idealBurndown, borderColor: '#94a3b8', borderDash: [5, 5], fill: false },
                        { label: 'Restante', data: sprint.pointsLeft, borderColor: '#ef4444', backgroundColor: 'rgba(239, 68, 68, 0.1)', fill: true, tension: 0.2 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function renderBurnup(labels) {
            if (burnupChart) burnupChart.destroy();
            const ctx = document.getElementById('burnupChart').getContext('2d');
            burnupChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Alcance Total (Scope)', data: sprint.dailyScope, borderColor: '#1e293b', borderDash: [2, 2], fill: false, stepped: true },
                        { label: 'Progreso Ideal', data: sprint.idealBurnup, borderColor: '#94a3b8', borderDash: [5, 5], fill: false },
                        { label: 'Completado Real', data: sprint.cumulativeDone, borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', fill: true, tension: 0.2 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function updateData() {
            const day = parseInt(document.getElementById('daySelect').value);
            const doneToday = parseFloat(document.getElementById('pointsDone').value) || 0;
            const newScopeValue = parseFloat(document.getElementById('newScope').value);

            // Update daily done
            sprint.dailyDone[day] = doneToday;

            // Handle Scope Creep if provided
            const currentScope = !isNaN(newScopeValue) ? newScopeValue : (sprint.dailyScope[day-1] || sprint.totalPoints);
            
            // Fill arrays up to current day
            for (let i = 1; i <= day; i++) {
                if (sprint.dailyDone[i] === undefined) sprint.dailyDone[i] = 0;
                
                // Cumulative logic
                let prevCumulative = sprint.cumulativeDone[i-1] || 0;
                sprint.cumulativeDone[i] = prevCumulative + (sprint.dailyDone[i] || 0);
                
                // Scope logic
                sprint.dailyScope[i] = (i === day) ? currentScope : (sprint.dailyScope[i] || sprint.dailyScope[i-1]);
                
                // Burndown logic
                sprint.pointsLeft[i] = sprint.dailyScope[i] - sprint.cumulativeDone[i];
            }

            burndownChart.update();
            burnupChart.update();
            updateTable();
            checkStatus(day);
            
            // Clear inputs
            document.getElementById('pointsDone').value = "";
            document.getElementById('newScope').value = "";
        }

        function switchTab(type) {
            const btnBurndown = document.getElementById('tabBurndown');
            const btnBurnup = document.getElementById('tabBurnup');
            const contBurndown = document.getElementById('containerBurndown');
            const contBurnup = document.getElementById('containerBurnup');

            if (type === 'burndown') {
                btnBurndown.className = "px-6 py-2 text-sm font-medium transition tab-active";
                btnBurnup.className = "px-6 py-2 text-sm font-medium transition text-gray-500 hover:text-indigo-600";
                contBurndown.classList.remove('hidden');
                contBurnup.classList.add('hidden');
            } else {
                btnBurnup.className = "px-6 py-2 text-sm font-medium transition tab-active";
                btnBurndown.className = "px-6 py-2 text-sm font-medium transition text-gray-500 hover:text-indigo-600";
                contBurnup.classList.remove('hidden');
                contBurndown.classList.add('hidden');
            }
        }

        function updateTable() {
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = '';
            for (let i = 0; i <= sprint.days; i++) {
                const row = document.createElement('tr');
                const scope = sprint.dailyScope[i] !== undefined ? sprint.dailyScope[i] : "-";
                const done = i === 0 ? "Inicia" : (sprint.dailyDone[i] !== undefined ? sprint.dailyDone[i] : "-");
                const cumulative = sprint.cumulativeDone[i] !== undefined ? sprint.cumulativeDone[i] : "-";
                const left = sprint.pointsLeft[i] !== undefined ? sprint.pointsLeft[i] : "-";
                
                let badge = "";
                if (i > 0 && left !== "-") {
                    const ideal = sprint.idealBurndown[i];
                    badge = left > ideal 
                        ? '<span class="text-red-600 font-bold">atrasado</span>' 
                        : '<span class="text-green-600 font-bold">a tiempo</span>';
                }

                row.innerHTML = `
                    <td class="px-4 py-3 font-medium">Día ${i}</td>
                    <td class="px-4 py-3 text-gray-600">${scope}</td>
                    <td class="px-4 py-3 text-emerald-600 font-bold">${done}</td>
                    <td class="px-4 py-3">${cumulative}</td>
                    <td class="px-4 py-3 text-indigo-600 font-bold">${left}</td>
                    <td class="px-4 py-3 text-[10px] uppercase">${badge}</td>
                `;
                tbody.appendChild(row);
            }
        }

        function checkStatus(day) {
            const msg = document.getElementById('statusMessage');
            const left = sprint.pointsLeft[day];
            const ideal = sprint.idealBurndown[day];
            msg.classList.remove('hidden');

            if (left <= 0) {
                msg.className = "mt-4 p-3 rounded-lg text-center font-bold bg-green-100 text-green-800 border border-green-200";
                msg.innerHTML = "🎯 ¡Objetivo Alcanzado! El equipo terminó todo el alcance.";
            } else if (left > ideal) {
                msg.className = "mt-4 p-3 rounded-lg text-center font-bold bg-amber-100 text-amber-800 border border-amber-200";
                msg.innerHTML = `⚠️ Alerta de Riesgo: Estamos ${ (left - ideal).toFixed(1) } puntos por encima del ideal. ¿Hay impedimentos?`;
            } else {
                msg.className = "mt-4 p-3 rounded-lg text-center font-bold bg-indigo-100 text-indigo-800 border border-indigo-200";
                msg.innerHTML = "🚀 Vamos por buen camino. La velocidad es constante.";
            }
        }

        window.onload = initCharts;
    </script>
</body>
</html>
